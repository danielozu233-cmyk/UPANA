<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Portal de Satisfacción Call Center</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --primary:#2563eb;
  --secondary:#0d6efd;
  --success:#16a34a;
  --danger:#dc2626;
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#1f2937;
}

/* =====================
   BODY
===================== */
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  padding:20px;
  height:100vh;
  color:var(--text);
}

/* =====================
   CARDS SUPERIORES
===================== */
.cards {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  margin-bottom:14px;
}

.card {
  background:linear-gradient(145deg,#ffffff,#f8fafc);
  padding:18px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  text-align:center;
  position:relative;
  transition:.3s ease;
}

.card::after {
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  box-shadow:0 0 0 transparent;
  transition:.3s;
}

.card:hover {
  transform:translateY(-4px);
}

.card:hover::after {
  box-shadow:0 0 20px rgba(37,99,235,.25);
}

.card h3 {
  font-size:13px;
  color:#6b7280;
  margin-bottom:6px;
  letter-spacing:.3px;
}

.card .valor {
  font-size:26px;
  font-weight:700;
  color:var(--primary);
}

/* =====================
   LAYOUT
===================== */
.layout {
  display:grid;
  grid-template-columns:1fr 1.6fr;
  gap:20px;
  height:calc(100vh - 230px);
}

/* =====================
   PANEL
===================== */
.panel {
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(8px);
  border-radius:20px;
  padding:18px;
  box-shadow:0 15px 30px rgba(0,0,0,.08);
  display:flex;
  flex-direction:column;
}

/* =====================
   GRAFICO
===================== */
canvas {
  max-width:420px;
  max-height:420px;
  margin:auto;
}

/* =====================
   TABLA
===================== */
.table-container {
  flex:1;
  overflow-y:auto;
  border-radius:14px;
}

table {
  width:100%;
  border-collapse:separate;
  border-spacing:0;
}

th,
td {
  padding:12px;
  border-bottom:1px solid #e5e7eb;
  font-size:13px;
  white-space:nowrap;
  vertical-align:middle;
}

/* 🔥 CENTRADO FORZADO COLUMNA RESPUESTA */
th:nth-child(4),
td:nth-child(4) {
  text-align:center !important;
}

/* 🔥 FORZAMOS CONTENEDOR FLEX EN TD RESPUESTA */
td:nth-child(4) {
  display:flex;
  justify-content:center;
  align-items:center;
}

/* HEADER */
th {
  background:linear-gradient(135deg,#2563eb,#0d6efd);
  color:#fff;
  position:sticky;
  top:0;
  z-index:5;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.5px;
  text-align:center;
}

tbody tr:hover {
  background:#eef2ff;
}

/* =====================
   BADGES SI / NO
===================== */
.verde,
.rojo {
  padding:6px 16px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  justify-content:center;
  min-width:50px;
}

.verde {
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;
}

.rojo {
  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:#fff;
}

/* =====================
   PROMEDIO
===================== */
td:last-child {
  font-weight:700;
  color:var(--primary);
  text-align: center;
}

/* =====================
   LINKS
===================== */
.link {
  color:var(--primary);
  cursor:pointer;
  font-weight:600;
  text-decoration:none;
}

.link:hover {
  text-decoration:underline;
}

/* =====================
   FILTRO
===================== */
.filtro-btn {
  position:fixed;
  top:20px;
  right:20px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:linear-gradient(135deg,#2563eb,#0d6efd);
  color:#fff;
  border:none;
  font-size:20px;
  cursor:pointer;
  z-index:300;
  box-shadow:0 10px 25px rgba(37,99,235,.5);
  transition:.3s;
}

.filtro-btn:hover {
  transform:scale(1.08) rotate(5deg);
}

.filtro-panel {
  position:fixed;
  top:80px;
  right:20px;
  background:#fff;
  padding:16px;
  border-radius:18px;
  box-shadow:0 20px 35px rgba(0,0,0,.18);
  display:none;
  width:240px;
  z-index:300;
}

.filtro-panel label {
  font-size:12px;
  font-weight:700;
  margin-top:12px;
  display:block;
  color:#374151;
}

.filtro-panel select,
.filtro-panel input {
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #c7d2fe;
}

/* =====================
   MODAL
===================== */
.modal {
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.55);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:400;
}

.modal-content {
  background:#fff;
  padding:22px;
  border-radius:20px;
  width:440px;
  box-shadow:0 25px 45px rgba(0,0,0,.3);
}

.modal-content h3 {
  margin-top:0;
  font-size:20px;
  color:var(--primary);
}

.modal button {
  margin-top:18px;
  width:100%;
  padding:10px;
  border:none;
  background:linear-gradient(135deg,#2563eb,#0d6efd);
  color:#fff;
  border-radius:10px;
  font-size:14px;
  cursor:pointer;
}

.modal button:hover {
  opacity:.9;
}

/* =====================
   OTROS
===================== */
.sati {
  text-align:center;
  font-weight:700;
}

</style>
</head>

<body>

<button class="filtro-btn" onclick="toggleFiltro()">🔍</button>

<div class="filtro-panel" id="filtroPanel">
  <label>Agente</label>
  <select id="filtroAgente">
    <option value="">Todos</option>
  </select>

  <label>Desde</label>
  <input type="date" id="fechaInicio">

  <label>Hasta</label>
  <input type="date" id="fechaFin">
</div>

<h1 class="sati">Portal de Satisfacción Call Center</h1>
<div class="cards">
  <div class="card"><h2 id="total">0</h2><p>Total encuestas</p></div>
  <div class="card"><h2 id="si">0</h2><p>Respuestas Sí</p></div>
  <div class="card"><h2 id="no">0</h2><p>Respuestas No</p></div>
  <div class="card">
    <h3>🏆 Ranking</h3>
    <ol id="ranking"></ol>
  </div>
</div>

<div class="layout">
  <div class="panel">
    <h3 style="text-align:center;"> Gráfico</h3>
    <canvas id="grafica"></canvas>
  </div>

 <div class="panel">
  <h3>Detalle de encuestas</h3>

  <div class="table-container" style="
    max-height: 370px;
    overflow-y: auto;
  ">
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Agente</th>
          <th>ID</th>
          <th  >Respuesta</th>
          <th>Prom.</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>
</div>

</div>

<div class="modal" id="modal">
  <div class="modal-content" id="detalle"></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyDeAbygOcoV1G9Zh8wd7topjXttlmJ892Y",
  authDomain:"workplace-18675.firebaseapp.com",
  projectId:"workplace-18675"
});
const db=firebase.firestore();

let dataGlobal=[],chart;

const tabla=document.getElementById('tabla');
const ranking=document.getElementById('ranking');
const filtroAgente=document.getElementById('filtroAgente');
const fechaInicio=document.getElementById('fechaInicio');
const fechaFin=document.getElementById('fechaFin');

const totalEl=document.getElementById('total');
const siEl=document.getElementById('si');
const noEl=document.getElementById('no');

function toggleFiltro(){
  const p=document.getElementById('filtroPanel');
  p.style.display=p.style.display==='block'?'none':'block';
}

window.onclick=e=>{
  if(!e.target.closest('.filtro-panel')&&!e.target.closest('.filtro-btn'))
    document.getElementById('filtroPanel').style.display='none';
};

function nombreBonito(n){
  return n?.replace(/_/g,' ').replace(/([a-z])([A-Z])/g,'$1 $2');
}

function mostrarDetalle(d){
  document.getElementById('detalle').innerHTML=`
    <h3>Coaching – ${nombreBonito(d.agente)}</h3>
    <p><b>ID Estudiante:</b> ${d.id}</p>
    <p>Amabilidad: ${d.amabilidad}</p>
    <p>Claridad: ${d.claridad}</p>
    <p>Tiempo respuesta: ${d.tiempo}</p>
    <p>Solución: ${d.solucion}</p>
    <p><b>Comentario:</b><br>${d.comentario||'Sin comentario'}</p>
    <button onclick="document.getElementById('modal').style.display='none'">Cerrar</button>
  `;
  document.getElementById('modal').style.display='flex';
}

/* 🔥 APLICAR FILTROS */
function aplicarFiltros(){
  const ag=filtroAgente.value;
  const fi=fechaInicio.value;
  const ff=fechaFin.value;

  const filtrados=dataGlobal.filter(d=>{
    if(ag && d.agente!==ag) return false;
    if(fi && d.fecha < fi) return false;
    if(ff && d.fecha > ff) return false;
    return true;
  });

  render(filtrados);
}

function render(datos){
let si = 0,
    no = 0,
    agentes = {}; // { agente: { suma: 0, total: 0 } }

tabla.innerHTML = '';
ranking.innerHTML = '';

datos.forEach(d => {
  d.respuesta === 'si' ? si++ : no++;

  // 🔥 Acumulamos promedios por agente
  if (!agentes[d.agente]) {
    agentes[d.agente] = { suma: 0, total: 0 };
  }

  agentes[d.agente].suma += Number(d.prom);
  agentes[d.agente].total++;

  tabla.innerHTML += `
    <tr>
      <td>${d.fecha}</td>
      <td>${nombreBonito(d.agente)}</td>
      <td>${d.id}</td>
      <td class="${d.respuesta === 'si' ? 'verde' : 'rojo'}">${d.respuesta}</td>
      <td class="link" onclick='mostrarDetalle(${JSON.stringify(d)})'>
        ${Number(d.prom).toFixed(2)}
      </td>
    </tr>`;
});

  /* 🔢 CONTADORES */
  totalEl.textContent = datos.length;
  siEl.textContent = si;
  noEl.textContent = no;

  /* 🏆 RANKING */
ranking.innerHTML = "";

const medallas = ["🥇", "🥈", "🥉"];

Object.entries(agentes)
  .map(([agente, info]) => ({
    agente,
    promedio: info.suma / info.total
  }))
  .sort((a, b) => b.promedio - a.promedio)
  .slice(0, 3)
  .forEach((a, i) => {
    ranking.innerHTML += `
      <li>
        ${medallas[i]} ${nombreBonito(a.agente)}
        <strong>(${a.promedio.toFixed(2)})</strong>
      </li>
    `;
  });


  /* 📊 GRÁFICA */
/* 📊 GRÁFICA */
if (chart) chart.destroy();

const ctx = grafica.getContext('2d');

const gradSi = ctx.createLinearGradient(0, 0, 0, 300);
gradSi.addColorStop(0, '#22c55e');
gradSi.addColorStop(1, '#16a34a');

const gradNo = ctx.createLinearGradient(0, 0, 0, 300);
gradNo.addColorStop(0, '#ef4444');
gradNo.addColorStop(1, '#dc2626');

const totalRespuestas = si + no;
const porcentajeSi = totalRespuestas ? ((si / totalRespuestas) * 100).toFixed(1) : 0;
const porcentajeNo = totalRespuestas ? ((no / totalRespuestas) * 100).toFixed(1) : 0;

chart = new Chart(grafica, {
  type: 'doughnut',
  data: {
    labels: [
      `Sí (${porcentajeSi}%)`,
      `No (${porcentajeNo}%)`
    ],
    datasets: [{
      data: [si, no],
      backgroundColor: [gradSi, gradNo],
      hoverBackgroundColor: ['#16a34a', '#dc2626'],
      borderWidth: 0
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    cutout: '70%',
    animation: {
      animateRotate: true,
      duration: 900,
      easing: 'easeOutQuart'
    },
    plugins: {
      legend: {
        position: 'bottom',
        labels: {
          usePointStyle: true,
          pointStyle: 'circle',
          padding: 20,
          font: {
            size: 13,
            weight: '600'
          }
        }
      },
      tooltip: {
        backgroundColor: '#111827',
        padding: 12,
        titleFont: { size: 14 },
        bodyFont: { size: 13 },
        callbacks: {
          label: ctx => {
            const value = ctx.raw;
            const percent = ((value / totalRespuestas) * 100).toFixed(1);
            return `${value} respuestas (${percent}%)`;
          }
        }
      }
    }
  },
  plugins: [{
    id: 'textoCentral',
    beforeDraw(chart) {
      const { ctx, width, height } = chart;
      ctx.restore();
      ctx.font = 'bold 22px Segoe UI';
      ctx.fillStyle = '#2563eb';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`${porcentajeSi}%`, width / 2, height / 2 - 8);

      ctx.font = '13px Segoe UI';
      ctx.fillStyle = '#6b7280';
      ctx.fillText('Satisfacción', width / 2, height / 2 + 14);
      ctx.save();
    }
  }]
});

}

/* 🔥 FIRESTORE */
db.collection('encuestas').onSnapshot(s=>{
  dataGlobal=[];
  filtroAgente.innerHTML='<option value="">Todos</option>';

  s.forEach(d=>{
    const x=d.data();
    if(!x.fecha) return;

    const fecha=x.fecha.toDate().toISOString().split('T')[0];
    const prom=((x.amabilidad+x.claridad+x.tiempo+x.solucion)/4).toFixed(2);

    dataGlobal.push({
      agente:x.agente,
      respuesta:x.respuesta,
      fecha,
      id:x.id_estudiante,
      prom,
      amabilidad:x.amabilidad,
      claridad:x.claridad,
      tiempo:x.tiempo,
      solucion:x.solucion,
      comentario:x.comentario||''
    });

    if(![...filtroAgente.options].some(o=>o.value===x.agente)){
      filtroAgente.innerHTML+=`<option value="${x.agente}">${nombreBonito(x.agente)}</option>`;
    }
  });

  aplicarFiltros();
});

/* 🎛️ EVENTOS FILTRO */
[filtroAgente,fechaInicio,fechaFin].forEach(e=>e.onchange=aplicarFiltros);
</script>


</body>
</html>
