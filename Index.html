        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 95vh;
            margin: 0;
            padding: 10px;
        }

        h1 {
            text-align: center;
            margin-bottom: 12px;
            font-size: 30px;
            font-weight: 700;
            color: #fff;
        }

        .contenedor {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            justify-content: center;
            align-items: start;
            width: 100%;
            max-width: 1400px;
        }

        .tarjeta {
            position: relative;
            background: #1e293b;
            border-radius: 12px;
padding:22px 8px 12px 8px; /* espacio arriba para login */
            text-align: center;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
            cursor: pointer;
            overflow: visible;
        }

        .tarjeta:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.45);
        }

        .flip {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .frontal,
        .trasera {
            backface-visibility: hidden;
            transition: opacity 0.3s ease;
            width: 100%;
        }

        .frontal.active {
            opacity: 1;
            z-index: 2;
            position: relative;
        }

        .frontal {
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
        }

        .trasera.active {
            opacity: 1;
            z-index: 2;
            position: relative;
        }

        .trasera {
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            max-height: 132px;
        }

        .nombre {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #fff;
        }

        .estado {
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            padding: 5px 12px;
            border-radius: 9999px;
            text-align: center;
            color: #fff;
        }

        .estado.libre {
            background: #16a34a;
        }

        .estado.ocupado {
            background: #facc15;
            color: #1e293b;
            animation: pulse 1.2s infinite;
        }

        .estado.excedido {
            background: #ef4444;
            color: #fff;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .tiempo {
            font-size: 14px;
            margin: 2px 0;
            color: #fff;
            font-weight: 500;
        }

        .tiempo span.cronometro {
            color: #facc15;
            font-weight: 700;
        }

        .menu-radial {
            position: fixed;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.25s ease;
            pointer-events: none;
            z-index: 2000;
        }

        .menu-radial.active {
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .menu-radial button {
            position: absolute;
            width: 55px;
            height: 55px;
            border: none;
            border-radius: 25%;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 25px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.4);
        }

        .menu-radial button:hover {
            transform: scale(1.15);
            box-shadow: 0 0 14px rgba(0, 0, 0, 0.6);
        }

        .btn-libre {
            background: #22c55e;
            top: -55px;
            left: -20px;
            box-shadow: 0 0 14px rgba(34, 197, 94, 0.8);
        }

        .btn-banio {
            background: #facc15;
            color: #1e293b;
            top: 15px;
            left: -65px;
            font-size: 14px;
            box-shadow: 0 0 10px rgba(253, 224, 71, 0.8);
        }

        .btn-almuerzo {
            background: #facc15;
            top: 15px;
            left: 25px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
        }

        .tarjeta.dimmed {
            filter: brightness(0.5);
            transform: scale(0.97);
        }

        .icon-telefono {
            position: absolute;
            top: 0px;
            right: 5px;
            cursor: pointer;
            font-size: 20px;
            z-index: 3;
        }

        .regresar {
            position: relative;
            top: 0px;
            right: -70px;
            cursor: pointer;
            font-size: 20px;
            z-index: 3;
        }


        .registro {
            display: flex;

            gap: 3px;

        }

        .registro input,

        .botones {

        .botones button {
            width: 35px;
            height: 35px;

            border-radius: 50%;
            font-size: 20px;

        }

        }

            font-size: 12px;

async function registrarLlamada(nombre){

  alert("Ingrese una cantidad válida");
  return;
}

// guardar historial
await addDoc(collection(db,"llamadas_test"),{
  agente:nombre,
  tipo:tipo,
  cantidad:cantidad,
  timestamp:serverTimestamp()
});

// buscar extensión

// referencia agente

// actualizar contador

await updateDoc(refAgente,{

await updateDoc(refAgente,{
salientes: increment(cantidad)
});

}catch(e){

btnReset.onclick = async () => {
  if (!confirm("¿Seguro que deseas REINICIAR todo (tiempos y llamadas)?")) return;
  nombres.forEach((nombre) => {
    tarjetas[nombre].info.tiempoBanio = 0;
    tarjetas[nombre].info.tiempoAlmuerzo = 0;
    tarjetas[nombre].info.tipo = null;
    tarjetas[nombre].info.inicio = null;
    tarjetas[nombre].estado.textContent = "Libre";
    tarjetas[nombre].estado.className = "estado libre";
    tarjetas[nombre].tiempoBanio.innerHTML = `Baño: <span class='cronometro'>0:00</span>`;
    tarjetas[nombre].tiempoAlmuerzo.innerHTML = `Almuerzo: <span class='cronometro'>0:00</span>`;
  });

  const resetData = {};
  nombres.forEach((nombre) => resetData[nombre] = { tipo: null, inicio: null, tiempoBanio: 0, tiempoAlmuerzo: 0 });
  await updateDoc(refBanio, resetData);

const llamadasSnapshot = await getDocs(collection(db, "llamadas_test"));
  for (const docSnap of llamadasSnapshot.docs) await deleteDoc(doc(db, "llamadas_test", docSnap.id));

  alert("Todo se ha reiniciado correctamente ✅");
};

btnExcel.onclick = async () => {
const llamadasSnapshot = await getDocs(collection(db, "llamadas_test"));
  const data = llamadasSnapshot.docs.map(d => {
    const item = d.data();
    const fecha = item.timestamp?.toDate ? item.timestamp.toDate().toLocaleString() : "";
    return { Agente: item.agente, Numero: item.numero, Respondió: item.respondio ? "✅" : "❌", Fecha: fecha };
  });

  if (!data.length) return alert("No hay llamadas registradas.");

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Llamadas");
  XLSX.writeFile(wb, `llamadas_salientes_${new Date().toLocaleDateString().replace(/\//g, "-")}.xlsx`);
};
