<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscripciones Banner</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDeAbygOcoV1G9Zh8wd7topjXttlmJ892Y",
    authDomain: "workplace-18675.firebaseapp.com",
    projectId: "workplace-18675",
    storageBucket: "workplace-18675.appspot.com",
    messagingSenderId: "606737102100",
    appId: "1:606737102100:web:7084120bdabf1f8ca2be01"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const propietarios = [
    { nombre: "Sarai Churumia", ext: 8001 },
    { nombre: "Justa Jaes", ext: 8002 },
    { nombre: "Javier Alvarez", ext: 8003 },
    { nombre: "Merlin Bajan", ext: 8004 },
    { nombre: "Mónica Ordónez", ext: 8005 },
    { nombre: "Alejandro Vásquez", ext: 8006 },
    { nombre: "Joselyne Velásquez", ext: 8007 },
    { nombre: "Jackeline Castillo", ext: 8008 },
    { nombre: "Mildred Cordero", ext: 8009 },
    { nombre: "Tania de León", ext: 8010 },
    { nombre: "Anthony García", ext: 8011 },
    { nombre: "María Velásquez", ext: 8012 },
    { nombre: "Jorge Veliz", ext: 8013 },
    { nombre: "Néstor Galvez", ext: 8015 },
    { nombre: "Andrea Jiménez", ext: 8016 },
    { nombre: "Diego Chiché", ext: 8017 },
    { nombre: "Ashley López", ext: 8018 },
    { nombre: "Synndy Sanchez", ext: 8020 },
    { nombre: "Mishell de León", ext: 8021 },
    { nombre: "Madelin Ovando", ext: 8023 },
    { nombre: "Evelyn de León", ext: 8024 },
    { nombre: "Bryan Cruz", ext: 8026 },
    { nombre: "Rafael Sánchez", ext: 8027 },
    { nombre: "Marta Morales", ext: 8028 },
    { nombre: "Pablo Ibañez", ext: 8029 },
    { nombre: "María Perdomo", ext: 8030 }
  ];

  const facultades = [
    "Económicas","Juridicas","Humanidades","Medícas",
    "Salud","Odontología","Comunicación","Teología",
    "Educación","Ingeniería","Arquitectura","Virtual"
  ];

  /* 🚀 AUTO LOAD */
  window.addEventListener("DOMContentLoaded", async () => {
    llenarSelects();
    await cargarReporteInicial();
  });

  function llenarSelects() {
    const propietarioSelect = document.getElementById('propietario');
    const filtroPropietario = document.getElementById('filtroPropietario');
    const facultadSelect = document.getElementById('facultad');
    const filtroFacultad = document.getElementById('filtroFacultad');

    propietarios.forEach(p => {
      [propietarioSelect, filtroPropietario].forEach(sel => {
        let o = document.createElement("option");
        o.value = p.nombre;
        o.textContent = p.nombre;
        sel.appendChild(o);
      });
    });

    facultades.forEach(f => {
      [facultadSelect, filtroFacultad].forEach(sel => {
        let o = document.createElement("option");
        o.value = f;
        o.textContent = f;
        sel.appendChild(o);
      });
    });
  }

  async function cargarReporteInicial() {
    const snapshot = await getDocs(collection(db, "inscripciones"));
    const registros = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    mostrarTabla(registros);
  }

  /* ➕ REGISTRO */
  window.registrar = async () => {
    const propietario    = document.getElementById('propietario').value;
    const nombre         = document.getElementById('nombre').value;
    const programa       = document.getElementById('programa').value;
    const facultad       = document.getElementById('facultad').value;
    const idEstudiante   = document.getElementById('idEstudiante').value;
    const motivo         = document.getElementById('motivo').value;
    const seguimiento    = document.getElementById('seguimiento').value;
    const fecha          = new Date().toISOString();

    if (!propietario || !nombre || !programa || !facultad || !idEstudiante || !motivo || !seguimiento) {
      alert("Todos los campos son obligatorios");
      return;
    }

    await addDoc(collection(db, "inscripciones"), {
      propietario, nombre, programa, facultad,
      idEstudiante, motivo, seguimiento, 
      completado:false,
      fecha
    });

    alert("Registro guardado ✔️");
    document.getElementById("formInscripcion").reset();
    cargarReporteInicial();
  };

  /* 🔎 FILTRAR */
  window.filtrar = async () => {
    const fp  = document.getElementById('filtroPropietario').value;
    const ff  = document.getElementById('filtroFacultad').value;
    const fi  = document.getElementById('fechaInicio').value;
    const ffn = document.getElementById('fechaFin').value;

    let qRef = collection(db, "inscripciones");
    const cond = [];

    if (fp)  cond.push(where("propietario", "==", fp));
    if (ff)  cond.push(where("facultad", "==", ff));
    if (fi)  cond.push(where("fecha", ">=", new Date(fi).toISOString()));
    if (ffn) cond.push(where("fecha", "<=", new Date(ffn).toISOString()));

    if (cond.length) qRef = query(qRef, ...cond);

    const snapshot = await getDocs(qRef);
    const reg = snapshot.docs.map(d => ({ id:d.id, ...d.data() }));
    mostrarTabla(reg);
  };

/* ✔ COMPLETAR */
window.marcarCompletado = async (id) => {
  await updateDoc(doc(db, "inscripciones", id), { completado:true });

  const msg = document.createElement("div");
  msg.textContent = "✔ Seguimiento completado";
  msg.className = "fixed bottom-4 right-4 bg-green-600 text-black px-4 py-2 rounded-md text-xs shadow-lg";
  document.body.appendChild(msg);
  setTimeout(()=> msg.remove(), 2000);

  cargarReporteInicial();
};


  /* 📊 TABLA */
  function mostrarTabla(registros) {
    const tbody = document.getElementById('tablaBody');
    tbody.innerHTML = "";

    registros.forEach(r => {
      let tr = document.createElement("tr");

      /* 🟢 efecto visual de fila completada */
      tr.className = r.completado ? "bg-green-800/40" : "";

      tr.innerHTML = `
        <td class="p-1">${r.propietario}</td>
        <td class="p-1">${r.nombre} ${r.completado ? "✔️" : ""}</td>
        <td class="p-1">${r.programa}</td>
        <td class="p-1">${r.facultad}</td>
        <td class="p-1">${r.idEstudiante}</td>
        <td class="p-1">${r.motivo}</td>
        <td class="p-1">${r.seguimiento}</td>
        <td class="p-1">
          ${ r.completado 
            ? `<span class="text-green-400 font-bold text-xs">✔ Listo</span>`
            : `<button class="btn-gold text-[10px] px-2 py-1 bg-yellow-500 hover:bg-yellow-600 rounded" onclick="marcarCompletado('${r.id}')">Completar</button>` }
        </td>
        <td class="p-1">${new Date(r.fecha).toLocaleString()}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  /* 🧾 XLSX */
  window.exportarExcel = () => {
    const wb = XLSX.utils.table_to_book(document.getElementById("tabla"), { sheet:"Reporte" });
    XLSX.writeFile(wb, "inscripciones.xlsx");
  };
</script>

<style>
  body { background:#363535; color:#f5f5f7; font-family:-apple-system; }

  #tablaBody tr:nth-child(odd)  { background:#222; }
  #tablaBody tr:nth-child(even) { background:#2b2b2b; }
  #tablaBody tr:hover          { background:#353535; }

  table, td, th { border-bottom:1px solid #444; }

  .btn-gold { background:#c9a23a; color:#000; font-weight:600; }

  input, select, textarea {
    background:#1f1f1f;
    border:1px solid #3b3b3b;
    color:#fafafa;
    font-size:0.8rem;
  }
</style>
</head>

<body class="p-3">
<h1 class="text-xl font-bold mb-3 text-yellow-400">📋 Inscripciones desde Banner</h1>

<div class="flex gap-3">

  <!-- 📝 FORM -->
  <div class="bg-gray-900 rounded-lg p-3 w-[28%]">
    <form id="formInscripcion" class="space-y-2 text-sm">
      <select id="propietario" class="w-full p-2 rounded"></select>
      <input id="nombre" placeholder="Nombre" class="w-full p-2 rounded">
      <input id="programa" placeholder="Programa" class="w-full p-2 rounded">
      <select id="facultad" class="w-full p-2 rounded"></select>
      <input id="idEstudiante" placeholder="ID" class="w-full p-2 rounded">
      <textarea id="motivo" placeholder="Motivo" class="w-full p-2 h-14 rounded"></textarea>
      <textarea id="seguimiento" placeholder="Tipo de seguimiento" class="w-full p-2 h-14 rounded"></textarea>

      <button type="button" onclick="registrar()"
        class="btn-gold w-full py-2 rounded text-sm">Registrar</button>
    </form>
  </div>

  <!-- 📊 REPORTE -->
  <div class="bg-gray-900 rounded-lg p-3 w-[72%]">
    <div class="flex gap-2 text-xs mb-2">
      <select id="filtroPropietario" class="p-1 rounded"><option value="">Propietario</option></select>
      <select id="filtroFacultad"   class="p-1 rounded"><option value="">Facultad</option></select>
      <input type="date" id="fechaInicio" class="p-1 rounded">
      <input type="date" id="fechaFin"    class="p-1 rounded">
      <button onclick="filtrar()"       class="btn-gold px-2 py-1 rounded">Filtrar</button>
      <button onclick="exportarExcel()" class="btn-gold px-2 py-1 rounded">XLSX</button>
    </div>

    <div class="overflow-auto max-h-[600px]">
      <table id="tabla" class="w-full text-xs border-collapse">
        <thead class="bg-gray-800">
          <tr>
            <th class="p-1">Prop</th>
            <th class="p-1">Nombre</th>
            <th class="p-1">Programa</th>
            <th class="p-1">Fac</th>
            <th class="p-1">ID</th>
            <th class="p-1">Motivo</th>
            <th class="p-1">Seg</th>
            <th class="p-1">✔️</th>
            <th class="p-1">Fecha</th>
          </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
      </table>
    </div>
  </div>
</div>

</body>
</html>
