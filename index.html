<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png"
        href="https://firebasestorage.googleapis.com/v0/b/workplace-18675.firebasestorage.app/o/logo-upana.png?alt=media&token=0e20b05d-a07f-474b-bd57-18171e29f277">
    <title>Formulario de Inscripciones Academia de Música 2026</title>

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <style>
        /* ⚠️ ESTILOS SIN CAMBIOS */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
            padding: 20px;
            margin: 0;
        }

        h1, p {
            text-align: center;
            color: #2c3e50;
        }

        form {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }

        input, select, textarea, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            background-color: #2c3e50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }

        .logo {
            width: 40%;
            display: block;
            margin: 0 auto 10px;
        }

        #overlay-exito,
        #overlay-cargando {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .mensaje {
            background: white;
            padding: 40px;
            max-width: 400px;
            text-align: center;
            border-radius: 12px;
            color: #2c3e50;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>

<img class="logo" src="https://firebasestorage.googleapis.com/v0/b/workplace-18675.firebasestorage.app/o/ACAMUSIC-removebg-preview.png?alt=media&token=25cc8705-da0b-4541-890b-e5ec8cc70a89" alt="UPANA">

<h1>Formulario de Inscripciones<br>Academia de Música 2026</h1>
<p>Al llenar este formulario uno de nuestros agentes te contactará en un lapso de 24 horas.</p>

<form id="miFormulario">

    <label>Nombres:</label>
    <input type="text" name="nombres" required>

    <label>Apellidos:</label>
    <input type="text" name="apellidos" required>

    <label>Correo:</label>
    <input type="email" name="correo" required>

    <label>Teléfono:</label>
    <input type="number" name="telefono" required>

    <label>Dirección exacta:</label>
    <input type="text" name="exacta" required>

    <label>Fecha de nacimiento:</label>
    <input type="date" name="nacimiento" required>

    <label>Nacionalidad:</label>
    <select name="nacionalidad" required>
        <option value="" disabled selected hidden>- Seleccionar -</option>
        <option>Guatemalteco</option>
        <option>Extranjero</option>
    </select>

    <label>Tipo de documento:</label>
    <select name="documento" required>
        <option value="" disabled selected hidden>- Seleccionar -</option>
        <option>CUI</option>
        <option>Pasaporte</option>
    </select>

    <label>Número de identificación:</label>
    <input type="number" name="identificacion" required>

    <label>Sexo:</label>
    <select name="sexo" required>
        <option value="" disabled selected hidden>- Seleccionar -</option>
        <option>Masculino</option>
        <option>Femenino</option>
    </select>

    <label>Tipo de participante:</label>
    <select name="tipoParticipante" required>
        <option value="" disabled selected hidden>- Seleccionar -</option>
        <option>Colaborador UPANA</option>
        <option>Estudiante UPANA</option>
        <option>Estudiante Verbo</option>
        <option>Externo</option>
    </select>

    <label>Curso:</label>
    <select id="instrumento" name="instrumento" required>
        <option value="" disabled selected hidden>- Seleccionar -</option>
        <option>Guitarra</option>
        <option>Piano</option>
    </select>

    <label>Horario:</label>
    <select id="horario" name="horario" required disabled>
        <option value="" disabled selected hidden>- Seleccionar -</option>
    </select>

    <label>Comentario adicional:</label>
    <textarea name="mensaje" placeholder="Horario preferido, comentarios"></textarea>

    <button type="submit">Enviar</button>
</form>

<div id="overlay-cargando">
    <div class="mensaje">
        <h2>Enviando formulario...</h2>
        <p>Por favor espera.</p>
    </div>
</div>

<div id="overlay-exito">
    <div class="mensaje">
        <h2>Formulario enviado</h2>
        <p>Te contactaremos en un lapso de 24 horas.</p>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDeAbygOcoV1G9Zh8wd7topjXttlmJ892Y",
    authDomain: "workplace-18675.firebaseapp.com",
    projectId: "workplace-18675"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

emailjs.init("NZK_zpaEbkaaXGeGz");

const horarios = {
    Guitarra: [
        "Martes y Jueves 12:00 – 13:00 (Estudiantes UPANA, Colaboradores y Público externo en general)",
        "Martes y Jueves 2:30 – 3:30 (Niños hasta 15 años)",
        "Martes y Jueves 4:00 – 5:00 (Personas de 16 años en adelante)",
        "Martes y Jueves 5:00 – 6:00 (Personas de 16 años en adelante)"
    ],
    Piano: [
        "Lunes y Miércoles 12:00 – 13:00 (Estudiantes UPANA, Colaboradores y Público externo en general)",
        "Lunes y Miércoles 2:30 – 3:30 (Niños hasta 15 años)",
        "Lunes y Miércoles 4:00 – 5:00 (Personas de 16 años en adelante)",
        "Lunes y Miércoles 5:00 – 6:00 (Personas de 16 años en adelante)"
    ]
};

const instrumento = document.getElementById("instrumento");
const horario = document.getElementById("horario");

instrumento.addEventListener("change", () => {
    horario.innerHTML = '<option value="" disabled selected hidden>- Seleccionar -</option>';
    horarios[instrumento.value].forEach(h => {
        const opt = document.createElement("option");
        opt.value = h;
        opt.textContent = h;
        horario.appendChild(opt);
    });
    horario.disabled = false;
});

let enviando = false;

document.getElementById("miFormulario").addEventListener("submit", async (e) => {
    e.preventDefault();
    if (enviando) return;
    enviando = true;

    const form = e.target;
    const btn = form.querySelector("button");

    btn.disabled = true;
    form.style.pointerEvents = "none";
    document.getElementById("overlay-cargando").style.display = "flex";

    try {
        const data = Object.fromEntries(new FormData(form).entries());
        data.fecha = new Date().toISOString();

        await addDoc(collection(db, "academia_musica"), data);

        // 🔧 CAMBIO CLAVE: sendForm (NO send)
        await emailjs.sendForm(
            "service_tfvtgmc",
            "template_0z6fygs",
            form
        );

        document.getElementById("overlay-cargando").style.display = "none";
        document.getElementById("overlay-exito").style.display = "flex";
        form.reset();

    } catch (error) {
        console.error(error);
        alert("Error al enviar el formulario");
        btn.disabled = false;
        form.style.pointerEvents = "auto";
        enviando = false;
        document.getElementById("overlay-cargando").style.display = "none";
    }
});
</script>

</body>
</html>
